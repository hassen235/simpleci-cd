#this is a work flow and especially a ci workflow
name: CI - BUILD & TEST

on:
  push:
    branches:
      - main
env:
  DOTNET-VERSION: "10.0.x"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET-VERSION }}

      # The actions/cache step for NuGet is the single biggest CI speed improvement I've found. Without it, dotnet restore re-downloads all packages on every run. With it, cache hits drop restore time from ~90 seconds to under 5 seconds.
      - name: Cache Nuget packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
        # The cache key uses a hash of all .csproj files — so it only invalidates when dependencies actually change, not on every code push. This mirrors the same principle as the Docker layer caching trick I described in Docker Multi-Stage Builds for .NET: Smaller & Faster Images.

      - name: Restoring
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: current directory
        run: tree

      - name: run so for integration testing to work
        run: |
          dotnet run --project ./web/web.csproj --no-build -c Release &
          sleep 10

      - name: Test
        run: |
          dotnet test simpleci-cd.sln -c Release --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

## docker build job for building and pushing the image to the docker registery or github registery
  docker-build:
    name: build & push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref=='refs/heads/main'&&github.event_name=='push'

    permissions:
       contents: read
       packages: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Log in to Gihub container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
